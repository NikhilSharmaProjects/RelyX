<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RelyX</title>
        <link rel="stylesheet" href="popup.css" />
    </head>
    <body>
        <main class="popup-shell">
            <header class="hero">
                <div>
                    <h1>RelyX Active Security</h1>
                    <p>Real-time browser threat defense</p>
                </div>
                <span id="liveState" class="live-chip">Live</span>
            </header>

            <section class="card score-card">
                <div class="score-head">
                    <span>Risk Score</span>
                    <span id="severityTag" class="severity-tag">LOW</span>
                </div>
                <div id="riskDial" class="risk-dial" style="--dial-angle: 0deg">
                    <div class="risk-dial-core">
                        <div id="riskScore" class="score">--</div>
                    </div>
                </div>
                <div id="threatType" class="threat">Analyzing...</div>
                <div id="confidenceLine" class="confidence-line">
                    Confidence: --
                </div>
            </section>

            <section class="card">
                <h2>Threat Explanation</h2>
                <p id="aiStatus" class="meta-line"></p>
                <p class="meta-line">AI response</p>
                <p id="explanation" class="explanation">
                    Run analysis on the current tab.
                </p>
                <ul id="reasons" class="reasons"></ul>
            </section>

            <section class="card">
                <h2>Threat Intelligence</h2>
                <div id="intelGrid" class="intel-grid"></div>
            </section>

            <section id="protectionCard" class="card hidden">
                <h2>Protection Event</h2>
                <p id="protectionText" class="explanation"></p>
            </section>

            <section id="downloadAlert" class="card hidden">
                <h2>Download Guard</h2>
                <p id="downloadText" class="explanation"></p>
            </section>

            <button id="analyzeBtn" class="analyze-btn">
                Re-Analyze Current Tab
            </button>
        </main>

        <script src="popup.js"></script>
    </body>
</html>
