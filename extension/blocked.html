<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RelyX Protection Active</title>
        <style>
            :root {
                --bg-1: #10060a;
                --bg-2: #22070f;
                --card: rgba(35, 11, 20, 0.76);
                --text: #fff3f5;
                --muted: #ffd7de;
                --danger: #ff617d;
                --danger-2: #ff3e64;
                --safe: #7be7ff;
            }

            * {
                box-sizing: border-box;
            }

            @keyframes drift {
                0% {
                    transform: translate3d(0, 0, 0) scale(1);
                }
                50% {
                    transform: translate3d(0, -16px, 0) scale(1.03);
                }
                100% {
                    transform: translate3d(0, 0, 0) scale(1);
                }
            }

            @keyframes pulse {
                0% {
                    box-shadow: 0 0 0 0 rgba(255, 97, 125, 0.65);
                }
                70% {
                    box-shadow: 0 0 0 26px rgba(255, 97, 125, 0);
                }
                100% {
                    box-shadow: 0 0 0 0 rgba(255, 97, 125, 0);
                }
            }

            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", Tahoma, sans-serif;
                color: var(--text);
                background:
                    radial-gradient(
                        circle at 12% 15%,
                        rgba(255, 96, 126, 0.28),
                        transparent 35%
                    ),
                    radial-gradient(
                        circle at 80% 80%,
                        rgba(255, 78, 86, 0.24),
                        transparent 42%
                    ),
                    linear-gradient(145deg, var(--bg-1), var(--bg-2));
                display: grid;
                place-items: center;
                padding: 24px;
                overflow: hidden;
            }

            body::before,
            body::after {
                content: "";
                position: fixed;
                border-radius: 50%;
                filter: blur(70px);
                z-index: 0;
                animation: drift 8s ease-in-out infinite;
            }

            body::before {
                width: 320px;
                height: 320px;
                left: -100px;
                top: 8%;
                background: rgba(255, 83, 109, 0.25);
            }

            body::after {
                width: 260px;
                height: 260px;
                right: -60px;
                bottom: 10%;
                background: rgba(126, 231, 255, 0.2);
                animation-delay: 0.8s;
            }

            .card {
                position: relative;
                z-index: 1;
                width: min(860px, 100%);
                border-radius: 20px;
                border: 1px solid rgba(255, 160, 174, 0.4);
                background: var(--card);
                backdrop-filter: blur(10px);
                box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5);
                padding: clamp(18px, 4vw, 30px);
            }

            .shield {
                width: 16px;
                height: 16px;
                border-radius: 999px;
                display: inline-block;
                margin-right: 8px;
                background: linear-gradient(
                    180deg,
                    var(--danger),
                    var(--danger-2)
                );
                animation: pulse 1.7s infinite;
            }

            .badge {
                display: inline-flex;
                align-items: center;
                border: 1px solid rgba(255, 161, 176, 0.4);
                color: #ffd8e0;
                background: rgba(255, 99, 127, 0.13);
                border-radius: 999px;
                padding: 7px 12px;
                text-transform: uppercase;
                letter-spacing: 0.9px;
                font-weight: 700;
                font-size: 11px;
            }

            h1 {
                margin: 12px 0 8px;
                font-size: clamp(30px, 5.4vw, 52px);
                line-height: 1.04;
            }

            .explanation {
                margin: 0;
                color: #ffe2e8;
                font-size: 16px;
                line-height: 1.5;
            }

            .meta {
                margin-top: 16px;
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
                gap: 10px;
            }

            .meta > div {
                border: 1px solid rgba(255, 189, 199, 0.25);
                border-radius: 12px;
                background: rgba(69, 18, 34, 0.55);
                padding: 10px;
            }

            .label {
                display: block;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.8px;
                color: var(--muted);
            }

            .value {
                display: block;
                margin-top: 4px;
                font-weight: 700;
                font-size: 15px;
                word-break: break-word;
            }

            .reasons {
                margin: 16px 0 0;
                padding-left: 18px;
            }

            .reasons li {
                margin-bottom: 8px;
                color: #ffe3e9;
            }

            .actions {
                margin-top: 18px;
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
            }

            .consent-box {
                margin-top: 14px;
                border: 1px solid rgba(248, 212, 221, 0.25);
                border-radius: 12px;
                padding: 12px;
                background: rgba(54, 20, 30, 0.5);
            }

            .consent-label {
                display: flex;
                align-items: flex-start;
                gap: 10px;
                color: #ffe2e8;
                line-height: 1.45;
                font-size: 14px;
            }

            .consent-label input {
                margin-top: 3px;
                accent-color: #ff617d;
            }

            #overrideHint {
                margin-top: 8px;
                font-size: 12px;
                color: #ffd2db;
            }

            button {
                border: 0;
                border-radius: 11px;
                padding: 12px 16px;
                font-weight: 700;
                cursor: pointer;
                transition: transform 160ms ease;
            }

            button:hover {
                transform: translateY(-1px);
            }

            #leaveBtn {
                background: linear-gradient(
                    90deg,
                    var(--danger),
                    var(--danger-2)
                );
                color: #2f040e;
            }

            #overrideBtn {
                background: #102d3e;
                color: #abebff;
                border: 1px solid rgba(171, 235, 255, 0.4);
            }

            #newTabBtn {
                background: #362030;
                color: #f8d4dd;
                border: 1px solid rgba(248, 212, 221, 0.25);
            }
        </style>
    </head>
    <body>
        <main class="card">
            <span class="badge"
                ><span class="shield"></span>RelyX Active Protection</span
            >
            <h1>System protected you in real time</h1>
            <p class="explanation" id="plainText"></p>

            <div class="meta">
                <div>
                    <span class="label">Threat Type</span>
                    <span class="value" id="threatType">Threat Detected</span>
                </div>
                <div>
                    <span class="label">Risk Score</span>
                    <span class="value" id="riskScore">0/100</span>
                </div>
                <div>
                    <span class="label">Severity</span>
                    <span class="value" id="severity">HIGH</span>
                </div>
                <div>
                    <span class="label">Confidence</span>
                    <span class="value" id="confidence">LOW</span>
                </div>
                <div>
                    <span class="label">Blocked URL</span>
                    <span class="value" id="targetUrl">Unknown</span>
                </div>
            </div>

            <ul id="reasons" class="reasons"></ul>

            <div class="consent-box">
                <label class="consent-label" for="responsibilityAck">
                    <input id="responsibilityAck" type="checkbox" />
                    <span>
                        I understand this website was blocked for safety
                        reasons, and I confirm that RelyX is not responsible for
                        any further actions or consequences if I continue.
                    </span>
                </label>
                <p id="overrideHint">
                    You must accept this acknowledgment before continuing.
                </p>
            </div>

            <div class="actions">
                <button id="leaveBtn" type="button">Leave Unsafe Page</button>
                <button id="overrideBtn" type="button">
                    Explicit Override (5 min)
                </button>
                <button id="newTabBtn" type="button">Open New Tab</button>
            </div>
        </main>

        <script src="blocked.js"></script>
    </body>
</html>
