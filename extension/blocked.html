<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RelyX Protection</title>
        <style>
            :root {
                --bg1: #0b1222;
                --bg2: #111827;
                --accent: #22d3ee;
                --danger: #fb7185;
                --text: #f8fafc;
                --muted: #cbd5e1;
            }
            * {
                box-sizing: border-box;
            }
            body {
                margin: 0;
                min-height: 100vh;
                font-family: "Segoe UI", Tahoma, sans-serif;
                color: var(--text);
                background:
                    radial-gradient(
                        circle at 10% 10%,
                        rgba(251, 113, 133, 0.3),
                        transparent 32%
                    ),
                    radial-gradient(
                        circle at 90% 80%,
                        rgba(34, 211, 238, 0.3),
                        transparent 38%
                    ),
                    linear-gradient(140deg, var(--bg1), var(--bg2));
                display: grid;
                place-items: center;
                padding: 24px;
            }
            .card {
                width: min(820px, 100%);
                background: rgba(15, 23, 42, 0.9);
                border: 1px solid rgba(251, 113, 133, 0.5);
                border-radius: 18px;
                padding: 22px;
                box-shadow: 0 30px 60px rgba(0, 0, 0, 0.35);
            }
            h1 {
                margin: 0 0 10px;
                font-size: clamp(28px, 4vw, 42px);
            }
            .badge {
                display: inline-block;
                background: rgba(251, 113, 133, 0.15);
                border: 1px solid rgba(251, 113, 133, 0.6);
                color: #fecdd3;
                border-radius: 999px;
                padding: 6px 10px;
                font-weight: 700;
                margin-bottom: 12px;
            }
            .meta {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
                gap: 10px;
                margin-top: 10px;
            }
            .meta div {
                border: 1px solid rgba(148, 163, 184, 0.28);
                border-radius: 10px;
                padding: 10px;
                background: rgba(15, 23, 42, 0.6);
            }
            .label {
                display: block;
                font-size: 12px;
                color: var(--muted);
                text-transform: uppercase;
            }
            .value {
                display: block;
                margin-top: 4px;
                font-weight: 700;
            }
            .reasons {
                margin: 14px 0;
                padding-left: 18px;
            }
            .reasons li {
                margin-bottom: 8px;
                color: #e2e8f0;
            }
            .explanation {
                margin: 8px 0 0;
                color: #e2e8f0;
                font-size: 16px;
                line-height: 1.5;
            }
            .actions {
                display: flex;
                gap: 10px;
                margin-top: 16px;
                flex-wrap: wrap;
            }
            button {
                border: 0;
                border-radius: 10px;
                padding: 11px 14px;
                cursor: pointer;
                font-weight: 700;
            }
            #backBtn {
                background: var(--accent);
                color: #082f49;
            }
            #homeBtn {
                background: #334155;
                color: #f8fafc;
            }
        </style>
    </head>
    <body>
        <main class="card">
            <div class="badge">RelyX Active Shield</div>
            <h1>I saved you from a threat</h1>
            <p class="explanation" id="plainText"></p>

            <div class="meta">
                <div>
                    <span class="label">Threat Type</span>
                    <span class="value" id="threatType">Risk Detected</span>
                </div>
                <div>
                    <span class="label">Risk Score</span>
                    <span class="value" id="riskScore">0/100</span>
                </div>
                <div>
                    <span class="label">Blocked URL</span>
                    <span class="value" id="targetUrl">Unknown</span>
                </div>
            </div>

            <ul id="reasons" class="reasons"></ul>

            <div class="actions">
                <button id="backBtn" type="button">Go Back To Safety</button>
                <button id="homeBtn" type="button">Open New Tab</button>
            </div>
        </main>

        <script src="blocked.js"></script>
    </body>
</html>
