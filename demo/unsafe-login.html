<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Member Login</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 0;
                background: #eff6ff;
            }
            .panel {
                max-width: 520px;
                margin: 48px auto;
                background: #fff;
                border: 1px solid #bfdbfe;
                border-radius: 12px;
                padding: 20px;
            }
            form {
                display: grid;
                gap: 10px;
            }
            input {
                padding: 10px;
                border: 1px solid #cbd5e1;
                border-radius: 8px;
            }
            button {
                padding: 10px;
                background: #2563eb;
                color: white;
                border: 0;
                border-radius: 8px;
            }
        </style>
    </head>
    <body>
        <div class="panel">
            <h1>Account Login</h1>
            <p>Enter your email and password to continue.</p>
            <form>
                <input type="email" name="email" placeholder="Email" />
                <input type="password" name="password" placeholder="Password" />
                <button type="button">Sign In</button>
            </form>
        </div>
    </body>
</html>
