<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Account Verification Required</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                background: #fff5f5;
                margin: 0;
            }
            .wrap {
                max-width: 640px;
                margin: 40px auto;
                background: #fff;
                border: 1px solid #fecaca;
                border-radius: 12px;
                padding: 20px;
            }
            .badge {
                display: inline-block;
                background: #fee2e2;
                color: #991b1b;
                padding: 4px 8px;
                border-radius: 6px;
                font-size: 12px;
            }
            form {
                margin-top: 14px;
                display: grid;
                gap: 10px;
            }
            input {
                padding: 10px;
                border: 1px solid #d1d5db;
                border-radius: 8px;
            }
            button {
                padding: 10px;
                border: 0;
                border-radius: 8px;
                background: #dc2626;
                color: white;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <span class="badge">URGENT SECURITY ALERT</span>
            <h1>Verify your bank login now</h1>
            <p>
                Your wallet access will be suspended in 15 minutes. Login and
                verify your password immediately.
            </p>
            <p>Claim your free security upgrade bonus after verification.</p>

            <form>
                <input type="email" placeholder="Email" />
                <input type="password" placeholder="Password" />
                <button type="button">Verify Account</button>
            </form>
        </div>
    </body>
</html>
